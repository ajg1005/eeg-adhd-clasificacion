[pytest]
testpaths = tests
python_files = test_*.py
markers =
    slow: tests que cargan TensorFlow / Keras o modelos exportados pesados
    requires_ml_model: requiere models/ml/final_model.joblib exportado
    requires_dl_model: requiere models/dl/final_model.keras exportado
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
